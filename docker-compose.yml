services:

  # FRONTEND (Node.js) — Contenedores originales

  autenticacion:
    build:
      context: ./Frontend/TiendaProyecto-master/CONTENEDOR 1
      dockerfile: Dockerfile
    container_name: restaurante-autenticacion
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - CATEGORIAS_URL=http://categorias:3002
      - PRODUCTOS_URL=http://productos:3003
      - PAGOS_URL=http://metodos-pago:3008
    networks:
      - red-restaurante
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  categorias:
    build:
      context: ./Frontend/TiendaProyecto-master/CONTENEDOR 2
      dockerfile: Dockerfile
    container_name: restaurante-categorias
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NODE_ENV=production
    networks:
      - red-restaurante
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  productos:
    build:
      context: ./Frontend/TiendaProyecto-master/CONTENEDOR 3
      dockerfile: Dockerfile
    container_name: restaurante-productos
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - NODE_ENV=production
    networks:
      - red-restaurante
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  pagos-original:
    build:
      context: ./Frontend/TiendaProyecto-master/CONTENEDOR 4
      dockerfile: Dockerfile
    container_name: restaurante-pagos-original
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - NODE_ENV=production
    networks:
      - red-restaurante
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # BACKEND (Python + Flask + SQLite)

  usuarios:
    build:
      context: ./Backend/servicios/Usuarios
      dockerfile: Dockerfile
    container_name: restaurante-usuarios
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
    volumes:
      - ./Backend/data:/data
    networks:
      - red-restaurante
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  carrito:
    build:
      context: ./Backend/servicios/Carrito
      dockerfile: Dockerfile
    container_name: restaurante-carrito
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
    volumes:
      - ./Backend/data:/data
    networks:
      - red-restaurante
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  pedidos:
    build:
      context: ./Backend/servicios/Pedidos
      dockerfile: Dockerfile
    container_name: restaurante-pedidos
    ports:
      - "3007:3007"
    environment:
      - PORT=3007
    volumes:
      - ./Backend/data:/data
    networks:
      - red-restaurante
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  metodos-pago:
    build:
      context: ./Backend/servicios/Metodos_de_Pago
      dockerfile: Dockerfile
    container_name: restaurante-metodos-pago
    ports:
      - "3008:3008"
    environment:
      - PORT=3008
    volumes:
      - ./Backend/data:/data
    networks:
      - red-restaurante
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3008/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  red-restaurante:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
